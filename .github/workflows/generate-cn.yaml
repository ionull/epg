    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: generator/qztv
        run: npm install

      - name: Generate EPG
        uses: ./generator/qztv
        with:
          channel_group: ${{ matrix.channel.group }}
          channel_id: ${{ matrix.channel.id }}
          display_name: ${{ matrix.channel.name }}
          output_path: parts/${{ matrix.channel.id }}.xml.gz

      - name: Commit output to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add parts/${{ matrix.channel.id }}.xml.gz
          
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update ${{ matrix.channel.id }} EPG [auto]"

          # Retry logic for parallel matrix pushes
          n=0
          max=10
          until [ $n -ge $max ]
          do
            # 1. Pull latest changes from remote
            # 2. Rebase our new commit on top of them
            # 3. Push
            git pull --rebase origin main && git push origin main && break
            
            n=$((n+1))
            echo "Push failed. Retrying in $n seconds..."
            sleep $((1 + $RANDOM % 5)) # Sleep 1-5 seconds to stagger retries
          done

