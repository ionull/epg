name: Generate Fujian EPGs

permissions:
  contents: write   # <-- grant write permission for repo contents

on:
  #schedule:
  #  - cron: '3 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1 # Run one by one to avoid Git push conflicts
      matrix:
        channel:
          #- id: FJTV1
          #  name: 福建综合
          #  group: FJTV
          #- id: FJTV3
          #  name: 福建公共
          #  group: FJTV
          #- id: FJTV4
          #  name: 福建新闻
          #  group: FJTV
          #- id: FJTV5
          #  name: 福建电视剧
          #  group: FJTV
          #- id: FJTV6
          #  name: 福建旅游
          #  group: FJTV
          #- id: FJTV7
          #  name: 福建经济
          #  group: FJTV
          #- id: FJTV8
          #  name: 福建文体
          #  group: FJTV
          #- id: FJTV9
          #  name: 福建少儿
          #  group: FJTV
          - id: QZTV1
            name: QZTV1
            group: QZTV
          - id: QZTV3
            name: QZTV3
            group: QZTV
          - id: QZTV4
            name: QZTV4
            group: QZTV
          - id: XMTV1
            name: 厦门一套
            group: XMTV
          - id: XMTV2
            name: 厦门二套
            group: XMTV
          - id: XMTV3
            name: 厦门三套
            group: XMTV
          - id: FZTV1
            name: 福州新闻
            group: FZTV
          - id: FZTV2
            name: 福州影视
            group: FZTV
          - id: FZTV3
            name: 福州生活
            group: FZTV
          - id: FZTV-BABY
            name: 福州少儿
            group: FZTV
          - id: ZZTV1
            name: 漳州新闻
            group: ZZTV
          - id: ZZTV2
            name: 漳州二套
            group: ZZTV
          
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: generator/qztv
        run: npm install

      - name: Generate EPG
        uses: ./generator/qztv
        with:
          channel_group: ${{ matrix.channel.group }}
          channel_id: ${{ matrix.channel.id }}
          display_name: ${{ matrix.channel.name }}
          output_path: parts/${{ matrix.channel.id }}.xml.gz
          suffix_path: ${{ matrix.channel.suffix }}

      - name: Commit output to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull
          git add parts/${{ matrix.channel.id }}.xml.gz
          git diff --cached --quiet || git commit -m "Update ${{ matrix.channel.id }} EPG [auto]"
          git push
